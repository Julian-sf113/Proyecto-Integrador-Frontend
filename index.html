<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Gestión de Tareas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-card__header">
                <i class="fa-solid fa-list-check login-card__icon"></i>
                <h1 class="login-card__title">Sistema de Gestión de Tareas</h1>
                <p class="login-card__subtitle">Inicia sesión para continuar</p>
            </div>

            <form id="loginForm" class="login-form" method="POST" novalidate>
                <div class="login-form__group">
                    <label for="loginEmail" class="login-form__label">
                        <i class="fa-solid fa-envelope"></i> Correo Electrónico
                    </label>
                    <input type="email" id="loginEmail" name="email"
                        class="login-form__input"
                        placeholder="correo@ejemplo.com"
                        aria-required="true" autocomplete="email">
                    <span class="login-form__error" id="loginEmailError"></span>
                </div>

                <div class="login-form__group">
                    <label for="loginPassword" class="login-form__label">
                        <i class="fa-solid fa-lock"></i> Contraseña
                    </label>
                    <input type="password" id="loginPassword" name="password"
                        class="login-form__input"
                        placeholder="Ingresa tu contraseña"
                        aria-required="true" autocomplete="current-password">
                    <span class="login-form__error" id="loginPasswordError"></span>
                </div>

                <button type="submit" class="login-form__btn" id="loginBtn">
                    <span class="login-form__btn-text">Iniciar Sesión</span>
                    <span class="login-form__btn-icon"><i class="fa-solid fa-right-to-bracket"></i></span>
                </button>

                <div class="login-form__message hidden" id="loginMessage"></div>
            </form>
        </div>

        <footer class="login-footer">
            <p class="login-footer__text">Sistema de Gestión de Tareas | SENA - Desarrollo Web</p>
        </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
